seed: 42

model:
  qwen_model: "Qwen/Qwen3-VL-8B-Instruct"
  qwen_dtype: "bfloat16"

  # V4-Slim: Bottleneck at 512 dims (vs V4's 2048→1024 = 10.5M)
  projector_bottleneck_dim: 512     # 4096→512→1024→plug(1024→256) = ~2.6M trainable

  # SAM3
  sam3_checkpoint: null
  image_size: 1008
  sam3_lr_scale: 0.1

  # SAM3 Orthogonal LoRA (frozen in Stage 1, unfrozen in Stage 2)
  sam3_lora_r: 32
  sam3_lora_alpha: 64.0
  sam3_lora_n_singular: 32
  sam3_lora_targets: ["q", "k", "v", "out_proj"]

data:
  train_metadata: "/home/aviad/datasets/ADE20K_textured_images/train_metadata.json"
  val_metadata: "/home/aviad/datasets/ADE20K_textured_images/val_metadata.json"
  qwen_gt_embeds_path: "/home/aviad/datasets/ADE20K_textured_images/qwen_gt_embeds_v4.pt"
  image_size: 1008
  augment: true
  num_workers: 0

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  num_epochs: 10          # Short run — just need ep5 vs ep10 comparison
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 3
  min_lr: 1.0e-6
  max_grad_norm: 1.0

  checkpoint_dir: "checkpoints_v4_slim"
  save_every: 5

# V4-Slim: Same 2-stage as V4 (projector only → SAM LoRA)
curriculum:
  alignment_epochs: 10    # Keep SAM LoRA frozen for the full 10-epoch run

loss:
  mask_weight: 1.0
  ce_weight: 1.0
  dice_weight: 3.0
  distillation_weight: 1.0   # Cosine distillation vs SAM text encoder
  orthogonal_weight: 0.01

# Monitoring
monitor:
  log_dir: "checkpoints_v4_slim/logs"
  plot_dir: "checkpoints_v4_slim/plots"
  test_metadata: "/home/aviad/datasets/RWTD/metadata.json"
  test_eval_every: 5
  test_output_dir: "checkpoints_v4_slim/test_results"
  baseline_results: "/home/aviad/sam3_detexture_comparison/eval_results_rwtd/results.json"
